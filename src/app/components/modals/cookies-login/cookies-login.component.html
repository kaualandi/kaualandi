<mat-dialog-content>
  <p>
    Este site utiliza cookies e outras ferramentas similares para aprimorar a
    sua navegação.<br />
    Para manter-se logado, você precisa permitir o uso de deles.
  </p>
</mat-dialog-content>

<mat-dialog-actions [attr.align]="'end'">
  <button type="button" mat-button [mat-dialog-close]="false"> Recusar </button>
  <button
    type="button"
    color="primary"
    mat-raised-button
    [mat-dialog-close]="true"
  >
    Aceitar
  </button>
</mat-dialog-actions>
