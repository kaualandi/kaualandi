<div class="lang-select">
  <button
    type="button"
    title="Mudar idioma"
    mat-button
    [matMenuTriggerFor]="menuRef"
  >
    {{ currentViewer }}
    <i icon="chevron_down"></i>
  </button>

  <mat-menu #menuRef="matMenu" class="lang-menu">
    @for (lang of optionsLangs; track lang.value) {
      <button mat-menu-item (click)="selectLang(lang.value)">
        {{ lang.label }}
      </button>
    }
  </mat-menu>
</div>
