<div class="cards projects">
  @for (project of projects; track $index) {
    <div class="card">
      <figure>
        <img src="{{ project.image }}" alt="{{ project.title }}" />

        <div class="techs">
          @for (tech of project.technologies; track $index) {
            <span> {{ tech }} </span>
          }
        </div>

        <figcaption>
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
          <a
            mat-button
            color="primary"
            href="{{ project.link }}"
            target="_blank"
          >
            Ver &lt;~&gt;
          </a>
        </figcaption>
      </figure>
    </div>
  }
</div>
